<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=MedievalSharp&family=Roboto:wght@300;400&display=swap" rel="stylesheet">
    <style>
        /* --- CORE RESPONSIVO --- */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            min-height: 100vh;
            background-color: #050505;
            /* Reemplaza con tu imagen del Cancerbero Almas */
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), 
                        url(cancerbero_almas.jpg) center/cover no-repeat fixed;
            font-family: 'Roboto', sans-serif;
            color: #e0e0e0;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        .main-wrapper {
            width: 100%;
            max-width: 1000px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            box-sizing: border-box;
        }

        /* --- TÍTULO ADAPTABLE --- */
        h1.main-title {
            font-family: 'MedievalSharp', cursive;
            /* clamp(mínimo, preferido, máximo) */
            font-size: clamp(1.8rem, 6vw, 3.5rem);
            color: #a31a1a;
            text-align: center;
            margin: 20px 0 30px 0;
            text-shadow: 0 0 15px rgba(163, 26, 26, 0.8), 2px 2px 4px #000;
            letter-spacing: 2px;
            line-height: 1.2;
        }

        /* --- PANEL CENTRAL --- */
        .control-panel {
            background-color: rgba(10, 15, 25, 0.85);
            border: 1px solid rgba(0, 150, 255, 0.25);
            border-radius: 15px;
            padding: clamp(15px, 4vw, 30px);
            width: 100%;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.8), inset 0 0 20px rgba(0, 100, 255, 0.1);
            backdrop-filter: blur(8px);
            box-sizing: border-box;
            position: relative;
        }

        /* --- GRID INTELIGENTE --- */
        .button-grid {
            display: grid;
            /* auto-fit llena el espacio; minmax evita que sean muy pequeños */
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 15px;
            width: 100%;
        }

        /* --- BOTONES --- */
        .panel-btn {
            background-color: rgba(0, 5, 15, 0.9);
            border: 1px solid #2a2a2a;
            border-radius: 8px;
            color: #b0b0b0;
            padding: 18px 15px;
            display: flex;
            align-items: center;
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            min-height: 65px;
            box-sizing: border-box;
        }

        .panel-btn:hover, .panel-btn:active {
            border-color: #0096ff;
            box-shadow: 0 0 20px rgba(0, 150, 255, 0.4);
            color: #fff;
            background-color: rgba(0, 20, 40, 0.95);
            transform: scale(1.02);
        }

        .btn-icon {
            width: 28px;
            height: 28px;
            margin-right: 15px;
            flex-shrink: 0; /* Evita que el icono se aplaste */
            display: flex;
            align-items: center;
            justify-content: center;
            color: #555;
            transition: color 0.3s;
        }

        .panel-btn:hover .btn-icon {
            color: #0096ff;
        }

        .btn-text {
            font-size: 1.05rem;
            font-weight: 400;
            letter-spacing: 0.5px;
        }

        .dynamic-url-text {
            font-size: 0.85rem;
            color: #666;
            text-align: center;
            margin-top: 20px;
            width: 100%;
        }

        /* --- FOOTER --- */
        footer {
            width: 100%;
            padding: 15px;
            text-align: center;
            background: rgba(0,0,0,0.8);
            margin-top: auto;
        }

        footer p {
            margin: 0;
            font-size: 0.75rem;
            color: #555;
            letter-spacing: 1px;
        }

        /* Ajuste específico para pantallas muy pequeñas (iPhone SE, etc) */
        @media (max-width: 360px) {
            .button-grid {
                grid-template-columns: 1fr;
            }
            .btn-text { font-size: 0.95rem; }
        }
    </style>
</head>
