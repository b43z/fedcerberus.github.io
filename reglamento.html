<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Federación Cancerbero</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&display=swap');

    body {
      margin: 0;
      padding: 0;
      font-family: 'Cinzel', serif;
      background: url('cancerbero_almas.jpg') no-repeat center center fixed;
      background-size: cover;
      color: #e0e0e0;
      text-align: center;
    }

    header {
      background-color: rgba(0, 0, 0, 0.7);
      padding: 20px;
      font-size: 2em;
      font-weight: bold;
      letter-spacing: 2px;
      text-shadow: 0 0 10px #ff004c, 0 0 20px #ff004c;
      animation: neonPulse 2s infinite alternate;
    }

    h2 {
      margin-top: 20px;
      font-size: 1.5em;
      text-shadow: 0 0 8px #ff004c;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 30px;
    }

    .btn {
      display: block;
      width: 80%;
      max-width: 250px;
      margin: 20px;
      padding: 15px;
      background-color: rgba(20, 20, 20, 0.8);
      border: 2px solid #ff004c;
      border-radius: 8px;
      color: #e0e0e0;
      text-decoration: none;
      font-size: 1.2em;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: all 0.3s ease;
      box-shadow: 0 0 10px #ff004c;
      animation: heartbeat 1.5s infinite;
    }

    .btn:hover {
      background-color: #ff004c;
      color: #000;
      box-shadow: 0 0 20px #ff004c, 0 0 40px #ff004c;
      animation: none;
    }

    @keyframes neonPulse {
      from {
        text-shadow: 0 0 10px #ff004c, 0 0 20px #ff004c;
      }
      to {
        text-shadow: 0 0 20px #ff004c, 0 0 40px #ff004c, 0 0 60px #ff004c;
      }
    }

    @keyframes heartbeat {
      0% { transform: scale(1); }
      25% { transform: scale(1.05); }
      40% { transform: scale(0.95); }
      60% { transform: scale(1.05); }
      100% { transform: scale(1); }
    }

    @media (max-width: 600px) {
      header {
        font-size: 1.5em;
      }
      h2 {
        font-size: 1.2em;
      }
      .btn {
        font-size: 1em;
        padding: 12px;
      }
    }
  </style>
</head>
<body>
  <header>Federación Cancerbero</header>
  <h2>Reglamento</h2>
  <div class="container">
    <a href="https://b43z.github.io/bot-Cerberus-Fed/" class="btn">Inicio</a>
  </div>
</body>
</html>
